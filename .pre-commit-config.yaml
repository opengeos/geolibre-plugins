# See https://pre-commit.com for usage:
#   pip install pre-commit && pre-commit install
#
# `plugins/*/index.js` and `plugins/*/style.css` are built bundles copied in from
# each plugin's own build, so they are size-checked but never reformatted.
# Markdown is left alone too: the docs use MkDocs Material admonitions
# (`!!! tip` + indented body) that Prettier de-indents and breaks, and
# `docs/plugins.md` is generated by `scripts/generate_plugins_page.py`.
ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        name: check for files larger than 10 MB
        # --enforce-all so updating a plugin bundle is checked too, not just new files
        args: [--maxkb=10240, --enforce-all]
      - id: check-json
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      # mkdocs.yml needs `!!python/name:` tags, which only the syntax-only
      # `--unsafe` parse accepts. Scope that relaxation to this one file so the
      # workflows and Dependabot config keep full validation (duplicate key
      # detection included).
      - id: check-yaml
        name: check yaml (mkdocs.yml)
        args: [--unsafe]
        files: ^mkdocs\.yml$
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: &bundles ^plugins/.*\.(js|css)$
      - id: mixed-line-ending
        exclude: *bundles
      - id: trailing-whitespace
        exclude: *bundles

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.6
    hooks:
      - id: prettier
        types_or: [javascript, css, json, yaml]
        exclude: *bundles

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
