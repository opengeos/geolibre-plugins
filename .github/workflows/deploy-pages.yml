name: Deploy to GitHub Pages

# Builds the MkDocs documentation site and publishes it to GitHub Pages at the
# custom domain in CNAME (plugins.geolibre.app). The raw plugin-registry.json
# and each plugin bundle are copied alongside the site so they stay served from
# the domain root (where the GeoLibre app fetches them).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same group.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate plugin catalog and build site
        run: |
          python scripts/generate_plugins_page.py
          mkdocs build --strict

      - name: Add registry, plugin bundles, and Pages metadata to the site
        run: |
          cp plugin-registry.json site/
          # Publish the plugin bundles under /plugins/<id>/. mkdocs already built
          # the catalog page at site/plugins/index.html, so merge the bundles in
          # alongside it rather than replacing the directory.
          if [ -d plugins ]; then
            mkdir -p site/plugins
            cp -r plugins/. site/plugins/
          fi
          cp CNAME .nojekyll site/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
