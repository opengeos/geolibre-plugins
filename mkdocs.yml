site_name: GeoLibre Plugins
site_description: The plugin marketplace for GeoLibre.
site_url: https://plugins.geolibre.app
repo_name: opengeos/geolibre-plugins
repo_url: https://github.com/opengeos/geolibre-plugins
edit_uri: edit/main/docs/
copyright: Copyright &copy; opengeos

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
    logo: material/puzzle
  favicon: https://geolibre.app/favicon.ico
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow

nav:
  - Home: index.md
  - Plugins: plugins.md
  - Develop a plugin: develop.md
  - Registry format: registry.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/opengeos/geolibre-plugins
    - icon: material/web
      link: https://geolibre.app
